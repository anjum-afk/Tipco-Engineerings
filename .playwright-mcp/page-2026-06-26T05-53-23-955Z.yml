      - generic [ref=e139]:
        - generic [ref=e140]:
          - heading "Mr. Ritesh Sharma" [level=2] [ref=e142]
          - generic [ref=e143]: Chairman and Managing Director
          - paragraph [ref=e144]: Mr. Ritesh Sharma, aged 37 years, is one of the Promoter, Chairman and Managing Director of our Company. In his previous stint, he was associated with Ritesh Engineers, partnership firm as a partner from August 2007 to June 2019 and has handled production and design department in manufacturing of machines and other related engineering good. He was also associated with Tipco Engineering Works, partnership firm as a partner from November 2017 to January 2019 and subsequently re-admitted as a partner on December 2020 and still is in association and is responsible for managing production operations, business development and strategic decision making in machine manufacturing and other related engineering goods. Currently, he is also associated with RGVY Enterprise, partnership firm as a partner since March 31, 2018. He is also associated as a partner in Hanutech Engineering Solutions, partnership firm since December 2020 and is responsible for business development, vendor and client management, supply chain coordination and operational planning in the trading and distribution of machines, pumps and valves. He was also associated with M/s. KR Industries (Partnership Firm) from February 2024 to April 2024, the partnership firm was engaged in trading, supplying of paints and polish materials. He was also associated with M/s. HRS07 Buildcon (Partnership Firm) as a Partner from April 2024 to December 2024, the partnership firm was engaged in business of real estate agents, builders and developers.
        - generic [ref=e145]:
          - heading "Ms. Sonia Sharma" [level=2] [ref=e147]
          - generic [ref=e148]: Whole-time Director
          - paragraph [ref=e149]: Ms. Sonia Sharma, aged 35 years, is one of the Promoter and Whole Time Director of our company. She is associated with Tipco Engineering Works, partnership firm as a partner since November 2017 and is responsible for production management, operations and overall business administration in machine manufacturing and other related engineering goods. She is also associated with RGVY Enterprises, partnership firm as a partner since March 31, 2018. She is also associated with Ritesh Engineers, partnership firm as a partner since June 01, 2019 and is responsible for handling the HR Department and Operations Management which is involved in manufacturing of machines and other related engineering good. She is associated with Polish Pro Private Limited since December 2021 as the First Director and Subscriber to Memorandum of Association of the Company (Polish Pro Private Limited is in the process of voluntary Striking off from MCA). She was appointed as the first Director (Executive Director) of our Company from the time of Company’s Incorporation since September 30, 2021 and subsequently was re-designated as the Whole Time Director with effect from August 07, 2025 and she is the subscriber to memorandum of association in our Company. She has total 7 years of experience in the Machine Manufacturing industry in which our company operates. In our Company she is responsible for overseeing the company’s Human Resource management and Operations management.
        - generic [ref=e150]:
          - heading "Mr. Anup Kumar Singh" [level=2] [ref=e152]
          - generic [ref=e153]: Non- Executive Director
          - paragraph [ref=e154]: Mr. Anup Kumar Singh, aged 43 years, is one of the Non- Executive Director of our Company since July 16, 2025. He holds a Provisional Degree Certificate in B.Tech. Electronics & Communication Engineering from Allahabad Agricultural Institute-Deemed University. He also holds Post Graduate Degree in Management (Entrepreneurship Development) from Symbiosis Centre for Distance Learning. In his previous stint, he was associated with Aksh Technologies Limited as Process Member-Engg. Services from June 2008 to May 01, 2010. He was also associated with Ross Process Equipment Private Limited as National Sales Manager from October 2014 to September 2024 He is responsible for overall growth of proprietorship in chemical sector and is responsible for business expansion, strategic growth, quality check and operational management. He has a total of 12 years of work experience in Engineering field.
        - generic [ref=e155]:
          - heading "Mr. Jeewan Chandra" [level=2] [ref=e157]
          - generic [ref=e158]: Non-Executive Independent Director
          - paragraph [ref=e159]: Mr. Jeewan Chandra, aged 50 years, is the Non-Executive Independent Director of our Company. He holds a bachelor’s degree in Commerce. He is a Practicing Fellow member of Cost and Works Accountants of India. He also holds a Certificate of passing Intermediate Examination of the Institute of Chartered Accountants of India. He was associated with Vodafone Digilink Limited as Deputy Manager-Finance & Accounts from January 2005 to March 2012. He was also associated with Telesuprecon Group of Companies as Chief of Finance & Accounting/ Audits Officer (CAFO) as a consultant from July 2015 to December 2016. Currently he is associated with J Chandra & Associates as a managing partner since September 2012 and still is in association and is responsible for overseeing cost accounting, cost audits, management accounting services, managing taxation vertical including direct and indirect tax compliance, advisory and representation before tax authorities. He is also been appointed as an Independent Director in PAN HR Solution Limited since July 2025 and is still in association. He has been appointed as the Non-Executive Independent Director in our Company w.e.f. July 16, 2025 for a term of 3 years. He has a total experience of 20 years in the fields of Finance & Accounts.
        - generic [ref=e160]:
          - heading "Mr. Patterson Thomas" [level=2] [ref=e162]
          - generic [ref=e163]: Non-Executive Independent Director
          - paragraph [ref=e164]: Mr. Patterson Thomas, aged 34 years, is the Non-Executive Independent Director of our Company. He holds Bachelor of Commerce and Bachelor of Law from Dr. Bhimrao Ambedkar University Agra. He has also completed Company Secretary Course from Institute of Company Secretaries of India and is an associate member of Institute of Company Secretaries of India. In his previous stint he was associated with Bloomm Inn Private Limited as Company Secretary from February 2018 to July 2020 and was also associated with SGS Infratech Limited as Company Secretary from September 2020 to September 2021. He is currently associated with Luxmi Shoes Private Limited since April 2022. He has a total experience of 7 years in Secretarial field. He has been appointed as the Non-Executive Independent Director in our Company w.e.f. July 16, 2025 for a term of 3 years.
